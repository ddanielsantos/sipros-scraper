name: Scrape SIPROS

on:
  # ── Execução manual ──────────────────────────────────────────
  workflow_dispatch:

  # ── Trigger: push que altere o scraper ──────────────────────
  push:
    branches: [main]
    paths:
      - "src/scraper.ts"
      - "src/runner.ts"
      - ".github/workflows/scrape.yml"

# ── Schedule ──────────────────────────────────────────────────
# ATENÇÃO: o site sipros.pa.gov.br BLOQUEIA IPs de datacenter
# (US, EUA). O runner hospedado do GitHub NÃO consegue acessá-lo.
# Para execução agendada real, use uma destas alternativas:
#   - Self-hosted runner no Brasil
#   - Cron local: crontab -e + bun run scripts/scrape.ts
#   - VPS em Belém com Docker: docker run sipros-scraper
#
# schedule:
#   - cron: "05,35 11-23 * * 1-6"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium + system dependencies
        run: bunx playwright install --with-deps chromium

      - name: Pre-flight connectivity test
        run: |
          echo "🌐 Verificando acesso ao site..."
          HTTP_CODE=$(curl -sSf -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 20 \
            https://www.sipros.pa.gov.br/selecoes/disponiveis 2>&1) && {
            echo "✅ Site respondeu HTTP $HTTP_CODE"
          } || {
            echo "❌ Site inacessível do runner GH Actions."
            echo ""
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║  O site sipros.pa.gov.br bloqueia IPs de datacenter.    ║"
            echo "║                                                        ║"
            echo "║  Soluções:                                             ║"
            echo "║  1. Use um self-hosted runner no Brasil                ║"
            echo "║  2. Rode localmente com: bun run scripts/scrape.ts     ║"
            echo "║  3. Use Docker: docker run sipros-scraper              ║"
            echo "╚══════════════════════════════════════════════════════════╝"
            exit 1
          }

      - name: Run scraper
        run: bun run scripts/scrape.ts
        env:
          DATA_FILE: ./data/sipros.json
          LOG_LEVEL: info
          LOG_JSON: true
          HEADLESS: "true"
          NODE_OPTIONS: --no-deprecation

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: error-*
          if-no-files-found: ignore

      - name: Commit updated data
        if: success()
        run: |
          git config user.name "sipros-scraper[bot]"
          git config user.email "sipros-scraper[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain data/sipros.json)" ]; then
            git add data/sipros.json
            git commit -m "chore(data): atualizar processos seletivos [skip ci]"
            git push
            echo "✅ Dados atualizados e commitados."
          else
            echo "ℹ️  Nenhuma mudança nos dados."
          fi
