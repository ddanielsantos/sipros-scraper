name: Scrape SIPROS

on:
  # ── Agendamento ──────────────────────────────────────────────
  schedule:
    # A cada 30 min, de segunda a sábado, das 8h às 20h horário de Brasília (UTC-3).
    # O cron do GH Actions é em UTC. 8h BRT = 11h UTC, 20h BRT = 23h UTC.
    # Minutos: 05 e 35 para espaçar de outros jobs.
    - cron: "05,35 11-23 * * 1-6"

    # Também roda uma vez aos domingos às 9h BRT (12h UTC) para manter
    # os dados atualizados no início da semana.
    - cron: "05 12 * * 0"

  # ── Execução manual ──────────────────────────────────────────
  workflow_dispatch:

  # ── Trigger opcional: push que altere o scraper ─────────────
  push:
    branches: [main]
    paths:
      - "src/scraper.ts"
      - "src/runner.ts"
      - ".github/workflows/scrape.yml"

# Permissão para commitar no repositório
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install chromium

      - name: Run scraper
        run: bun run scripts/scrape.ts
        env:
          DATA_FILE: ./data/sipros.json
          LOG_LEVEL: info
          LOG_JSON: true
          HEADLESS: "true"
          NODE_OPTIONS: --no-deprecation

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: error-*
          if-no-files-found: ignore

      - name: Commit updated data
        if: success()
        run: |
          git config user.name "sipros-scraper[bot]"
          git config user.email "sipros-scraper[bot]@users.noreply.github.com"

          # Só commit se houve mudança
          if [ -n "$(git status --porcelain data/sipros.json)" ]; then
            git add data/sipros.json
            git commit -m "chore(data): atualizar processos seletivos [skip ci]"
            git push
            echo "✅ Dados atualizados e commitados."
          else
            echo "ℹ️  Nenhuma mudança nos dados."
          fi
