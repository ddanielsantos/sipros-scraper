name: Scrape SIPROS

on:
  # ── Execução manual ──────────────────────────────────────────
  workflow_dispatch:

  # ── Trigger: push que altere o scraper ──────────────────────
  push:
    branches: [main]
    paths:
      - "src/scraper.ts"
      - "src/runner.ts"
      - ".github/workflows/scrape.yml"

# ── Schedule ──────────────────────────────────────────────────
# schedule:
#   - cron: "05,35 11-23 * * 1-6"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fix DNS for sipros.pa.gov.br (DNSSEC mal configurado)
        run: |
          # O domínio sipros.pa.gov.br tem DNSSEC inválido.
          # O 8.8.8.8 (Google) e o default do Ubuntu rejeitam.
          # O 1.1.1.1 (Cloudflare) resolve corretamente.
          sudo sed -i 's/#DNS=/DNS=1.1.1.1 1.0.0.1/' /etc/systemd/resolved.conf
          sudo sed -i 's/#FallbackDNS=/FallbackDNS=1.1.1.1 1.0.0.1/' /etc/systemd/resolved.conf
          sudo sed -i 's/#DNSSEC=no/DNSSEC=no/' /etc/systemd/resolved.conf
          sudo systemctl restart systemd-resolved
          echo "✅ DNS configurado: 1.1.1.1 / 1.0.0.1 (DNSSEC off)"
          dig www.sipros.pa.gov.br +short

      - name: Pre-flight connectivity test
        run: |
          echo "🌐 Verificando acesso ao site..."
          HTTP_CODE=$(curl -sSf -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 20 \
            https://www.sipros.pa.gov.br/selecoes/disponiveis 2>&1) && {
            echo "✅ Site respondeu HTTP $HTTP_CODE"
          } || {
            CODE=$?
            echo ""
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║  Site inacessível do runner GH Actions.                ║"
            echo "║                                                        ║"
            echo "║  Pode ser:                                            ║"
            echo "║  1. DNS (verifique o passo anterior)                  ║"
            echo "║  2. IP do datacenter bloqueado pelo site              ║"
            echo "║                                                        ║"
            echo "║  Alternativas:                                        ║"
            echo "║  - Self-hosted runner no Brasil                       ║"
            echo "║  - Cron local: veja CRON.md                           ║"
            echo "║  - VPS + crontab: scripts/setup-vps.sh                ║"
            echo "╚══════════════════════════════════════════════════════════╝"
            exit $CODE
          }

      - name: Run scraper
        run: bun run scripts/scrape.ts
        env:
          DATA_FILE: ./data/sipros.json
          LOG_LEVEL: info
          LOG_JSON: true
          HEADLESS: "true"
          NODE_OPTIONS: --no-deprecation

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: error-*
          if-no-files-found: ignore

      - name: Commit updated data
        if: success()
        run: |
          git config user.name "sipros-scraper[bot]"
          git config user.email "sipros-scraper[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain data/sipros.json)" ]; then
            git add data/sipros.json
            git commit -m "chore(data): atualizar processos seletivos [skip ci]"
            git push
            echo "✅ Dados atualizados e commitados."
          else
            echo "ℹ️  Nenhuma mudança nos dados."
          fi
