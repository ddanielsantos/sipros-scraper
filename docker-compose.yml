version: "3.9"

services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sipros-scraper
    restart: unless-stopped
    environment:
      - SCRAPE_INTERVAL_MINUTES=${SCRAPE_INTERVAL:-30}
      - DATA_FILE=/app/data/sipros.json
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_JSON=true
      - HEADLESS=true
    volumes:
      - sipros-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/data/sipros.json && jq -e '.total > 0' /app/data/sipros.json > /dev/null 2>&1 || exit 1"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 2m

